services:
  - type: web
    name: square-discord-category-webhook
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: SQUARE_ENVIRONMENT
        value: production
      - key: SQUARE_API_VERSION
        value: 2026-05-20
      - key: CATEGORY_NAME
        value: TCG Singles
      - key: ANNOUNCE_ADDS
        value: true
      - key: ANNOUNCE_CATALOG_UPDATES
        value: false
      - key: ANNOUNCE_UPDATES
        value: false
      - key: ANNOUNCE_QUANTITY_UPDATES
        value: true
      - key: ANNOUNCE_SOLD_OUT
        value: true
      - key: INVENTORY_STATE
        value: IN_STOCK
      - key: ONLY_ANNOUNCE_ACTIVE_ITEMS
        value: true
      - key: SHOW_ITEM_IMAGE
        value: true
      - key: LINK_MODE
        value: direct_only
      - key: SYNC_LOOKBACK_SECONDS
        value: 5
      - key: STATE_DIR
        value: /var/data
    disk:
      name: square-discord-state
      mountPath: /var/data
      sizeGB: 1
